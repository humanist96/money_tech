<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #040810;
      color: #c8d6e5;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .logo {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: linear-gradient(135deg, #00e8b8, #00b894);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    .title { font-size: 14px; font-weight: 600; color: #fff; }
    .title span { color: #00e8b8; }
    .status {
      padding: 12px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 12px;
      border: 1px solid;
    }
    .status.success {
      background: rgba(0, 232, 184, 0.1);
      border-color: rgba(0, 232, 184, 0.2);
      color: #00e8b8;
    }
    .status.error {
      background: rgba(255, 87, 87, 0.1);
      border-color: rgba(255, 87, 87, 0.2);
      color: #ff5757;
    }
    .status.info {
      background: rgba(26, 39, 68, 0.5);
      border-color: #1a2744;
      color: #8899b4;
    }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #00e8b8, #00b894);
      color: #040810;
    }
    .btn-primary:hover { box-shadow: 0 0 20px rgba(0, 232, 184, 0.3); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-danger {
      background: rgba(255, 87, 87, 0.1);
      border: 1px solid rgba(255, 87, 87, 0.2);
      color: #ff5757;
      margin-top: 8px;
    }
    .btn-danger:hover { background: rgba(255, 87, 87, 0.2); }
    .url-input {
      width: 100%;
      padding: 8px 10px;
      background: #0a1628;
      border: 1px solid #1a2744;
      border-radius: 6px;
      color: #fff;
      font-size: 11px;
      margin-bottom: 10px;
      outline: none;
    }
    .url-input:focus { border-color: rgba(0, 232, 184, 0.5); }
    label { font-size: 11px; color: #556a8a; display: block; margin-bottom: 4px; }
    .hint { font-size: 10px; color: #556a8a; margin-top: 8px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">M</div>
    <div class="title">Money<span>Tech</span> Connector</div>
  </div>

  <div id="status" class="status info">확인 중...</div>

  <div id="url-section" style="margin-bottom: 10px;">
    <label>MoneyTech URL</label>
    <input type="text" id="siteUrl" class="url-input" value="https://frontend-xi-six-47.vercel.app" placeholder="https://your-site.vercel.app">
  </div>

  <button id="connectBtn" class="btn btn-primary" disabled>연결하기</button>
  <button id="disconnectBtn" class="btn btn-danger" style="display:none">연결 해제</button>

  <p class="hint" id="hint"></p>

  <script src="popup.js"></script>
</body>
</html>
