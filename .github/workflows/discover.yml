name: Creator Discovery

on:
  schedule:
    - cron: '0 3 * * 1'  # 매주 월요일 03:00 UTC (한국시간 12:00)
  workflow_dispatch:  # 수동 실행

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r crawler/requirements.txt

      - name: Run discovery pipeline
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: |
          cd crawler
          python discover.py

      - name: Commit auto-registered channels
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add crawler/channels.json crawler/bloggers.json crawler/candidates.json
          if git diff --cached --quiet; then
            echo "No new channels discovered"
          else
            git commit -m "feat: 자동 발굴 - 신규 크리에이터 등록 ($(date -u +%Y-%m-%d))"
            git push
          fi

      - name: Log completion
        if: always()
        run: echo "Discovery finished at $(date -u)"
