name: MoneyTech Crawler

on:
  schedule:
    - cron: '0 */6 * * *'  # 매 6시간 (0, 6, 12, 18시 UTC)
  workflow_dispatch:  # 수동 실행

jobs:
  youtube:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r crawler/requirements.txt

      - name: Run YouTube crawler
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SKIP_SUBTITLE: '1'
        run: |
          cd crawler
          python main.py

  blog:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r crawler/requirements.txt

      - name: Run Blog crawler
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd crawler
          python blog_crawler.py

  telegram:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r crawler/requirements.txt

      - name: Run Telegram crawler
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
        run: |
          cd crawler
          python telegram_crawler.py

  analyst-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r crawler/requirements.txt

      - name: Run Analyst Report crawler
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd crawler
          python report_crawler.py

  discussion:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r crawler/requirements.txt

      - name: Run Discussion crawler
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd crawler
          python discussion_crawler.py

  daily-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Independent of the slow channel loop. Backfills the last 14 KST days so any
    # missed window self-heals after a youtube job timeout.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r crawler/requirements.txt

      - name: Compute daily_stats (with 14d backfill)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd crawler
          python compute_stats.py --backfill

  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [youtube, blog, telegram, analyst-report, discussion]
    if: always() && (needs.youtube.result == 'success' || needs.blog.result == 'success' || needs.telegram.result == 'success' || needs.analyst-report.result == 'success')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r crawler/requirements.txt

      - name: Collect prices & evaluate predictions
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd crawler
          python evaluate.py

      - name: Log completion
        if: always()
        run: echo "Pipeline finished at $(date -u)"
