name: MoneyTech Crawler

on:
  schedule:
    - cron: '0 */6 * * *'  # 매 6시간 (0, 6, 12, 18시 UTC)
  workflow_dispatch:  # 수동 실행

jobs:
  youtube:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r crawler/requirements.txt

      - name: Run YouTube crawler
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SKIP_SUBTITLE: '1'
        run: |
          cd crawler
          python main.py

  blog:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r crawler/requirements.txt

      - name: Run Blog crawler
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: |
          cd crawler
          python blog_crawler.py

  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [youtube, blog]
    if: always() && (needs.youtube.result == 'success' || needs.blog.result == 'success')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r crawler/requirements.txt

      - name: Collect prices & evaluate predictions
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd crawler
          python evaluate.py

      - name: Log completion
        if: always()
        run: echo "Pipeline finished at $(date -u)"
